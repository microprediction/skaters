name: wheels

# Build the skaters-fast (PyO3) abi3 wheel matrix. abi3-py39 means one wheel
# per platform serves all of CPython >= 3.9. Artifacts only: no PyPI publish
# (see the commented stanza at the end).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  MANIFEST: rust/python/Cargo.toml

jobs:
  linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.9" }
      - name: build manylinux wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: auto
          args: --release --out dist -m ${{ env.MANIFEST }}
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-manylinux-${{ matrix.target }}
          path: dist

  musllinux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.9" }
      - name: build musllinux wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: musllinux_1_2
          args: --release --out dist -m ${{ env.MANIFEST }}
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-musllinux-${{ matrix.target }}
          path: dist

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.9" }
      - name: build macOS universal2 wheel
        uses: PyO3/maturin-action@v1
        with:
          target: universal2-apple-darwin
          args: --release --out dist -m ${{ env.MANIFEST }}
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-universal2
          path: dist

  windows:
    runs-on: windows-latest
    strategy:
      matrix:
        target: [x64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.9" }
      - name: build windows wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist -m ${{ env.MANIFEST }}
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-x86_64
          path: dist

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist -m ${{ env.MANIFEST }}
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist

  # ---------------------------------------------------------------------------
  # PyPI publish is intentionally NOT enabled. To turn it on, add a trusted
  # publisher on PyPI for this project and uncomment:
  #
  # publish:
  #   name: publish to PyPI
  #   needs: [linux, musllinux, macos, windows, sdist]
  #   runs-on: ubuntu-latest
  #   if: startsWith(github.ref, 'refs/tags/v')
  #   permissions:
  #     id-token: write        # trusted publishing (OIDC), no API token
  #   steps:
  #     - uses: actions/download-artifact@v4
  #       with: { path: dist, merge-multiple: true }
  #     - uses: PyO3/maturin-action@v1
  #       with:
  #         command: upload
  #         args: --non-interactive --skip-existing dist/*
